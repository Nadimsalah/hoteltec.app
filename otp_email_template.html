<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Your Hoteltec Verification Code</title>
</head>

<body
    style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; margin: 0; padding: 0;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f8fafc; padding: 60px 0;">
        <tr>
            <td align="center">
                <!-- Main Card -->
                <table width="500" cellpadding="0" cellspacing="0"
                    style="background-color: #ffffff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0;">

                    <!-- Header (Logo Section) -->
                    <tr>
                        <td style="padding: 40px 40px 20px 40px; text-align: center;">
                            <!-- Using text instead of raw image to ensure it loads perfectly, mimicking your brand styling -->
                            <h1
                                style="margin: 0; font-size: 36px; font-weight: 800; color: #0f172a; letter-spacing: -1.5px;">
                                HotelTec<span style="color: #3b82f6;">.</span>
                            </h1>
                        </td>
                    </tr>

                    <!-- Body -->
                    <tr>
                        <td style="padding: 10px 40px 40px 40px; text-align: center;">
                            <h2
                                style="margin: 0 0 16px 0; font-size: 24px; font-weight: 700; color: #0f172a; letter-spacing: -0.5px;">
                                Your Secure Login Code</h2>
                            <p style="margin: 0 0 32px 0; font-size: 16px; line-height: 24px; color: #475569;">
                                Use the following 4-digit verification code to securely sign in to your Hoteltec
                                account.
                            </p>

                            <!-- OTP Box Area -->
                            <table width="100%" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td align="center" style="padding: 0 0 32px 0;">
                                        <div
                                            style="background-color: #f1f5f9; border: 2px dashed #cbd5e1; border-radius: 16px; padding: 24px;">
                                            <!-- Supabase injects the 4-digit code dynamically via {{ .Token }} -->
                                            <h1
                                                style="margin: 0; font-size: 48px; font-weight: 800; letter-spacing: 12px; color: #0f172a; font-family: 'Courier New', Courier, monospace;">
                                                {{ .Token }}
                                            </h1>
                                        </div>
                                    </td>
                                </tr>
                            </table>

                            <p style="margin: 0 0 12px 0; font-size: 14px; color: #64748b; line-height: 20px;">
                                This code will expire in 10 minutes.<br />
                                If you didn't request this code, you can safely ignore this email.
                            </p>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td
                            style="padding: 24px 40px; background-color: #f8fafc; text-align: center; border-top: 1px solid #f1f5f9;">
                            <p style="margin: 0; font-size: 13px; color: #94a3b8; font-weight: 500;">
                                Securely delivered by Hoteltec API
                                <br />
                                &copy; 2026 Hoteltec.app
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>

</html>
